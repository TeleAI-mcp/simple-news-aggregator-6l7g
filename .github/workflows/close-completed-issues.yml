name: Close completed issues

on:
  issues:
    types: [labeled, opened]

jobs:
  close-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Close issue if labeled completed
        if: contains(github.event.label.name, 'completed') || (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'completed'))
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            })
